<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule — uOttawa Chess Club</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">uOttawa Chess Club: Schedule</h1>
    <nav class="main-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="schedule.html">Schedule</a>
      <a href="registration.html">Registration</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Schedule</h2>
      <p>All regular sessions take place in Morisset 218 (on campus) from 6:00 PM to 8:00 PM, every Thursday.</p>

      <div class="schedule-controls" role="group" aria-label="Schedule filters">
        <button type="button" class="schedule-filter active" data-filter="all">All</button>
        <button type="button" class="schedule-filter" data-filter="Welcome">Welcome</button>
        <button type="button" class="schedule-filter" data-filter="Tournament">Tournament</button>
        <button type="button" class="schedule-filter" data-filter="Workshop">Workshop</button>
      </div>

      <p id="schedule-status" class="schedule-status" aria-live="polite"></p>

      <table>
        <caption>uOttawa Chess Club Special Events</caption>
        <thead>
          <tr>
            <th scope="col">Date</th>
            <th scope="col">Event</th>
            <th scope="col">Location</th>
          </tr>
        </thead>
        <tbody id="schedule-body"></tbody>
      </table>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 CSI 3140 Lab 2 — uOttawa Chess Club</p>
  </footer>

  <script src="shared.js"></script>
  <script src="schedule.js"></script>

</body>
</html>
